bind_addr = "0.0.0.0"
port = 2222
host_key = "/etc/qssh/host.key"
host_cert = "/etc/qssh/host.cert"

# Deny-by-default for direct-tcpip. Add exact host:port entries to allow.
direct_tcpip_allowlist = [
  # "127.0.0.1:5432",
]

# Remote forwards are loopback-only by default. Add exact bind_addr:bind_port
# entries only when non-loopback listeners are required.
remote_forward_allowlist = [
  # "0.0.0.0:22222",
]

# Per authenticated connection limits.
max_channels_per_connection = 32
max_remote_forwards_per_connection = 8
