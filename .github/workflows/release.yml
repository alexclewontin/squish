name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deb: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deb: true
          - os: macos-latest
            target: aarch64-apple-darwin
            deb: false
          - os: macos-13
            target: x86_64-apple-darwin
            deb: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cmake
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Build
        run: cargo build --release --workspace

      - name: Archive binaries
        run: |
          tar czf squish-${{ matrix.target }}.tar.gz \
            -C target/release qssh qsshd qssh-bootstrap

      - name: Upload binary archive
        uses: actions/upload-artifact@v7
        with:
          name: squish-${{ matrix.target }}
          path: squish-${{ matrix.target }}.tar.gz

      - name: Build .deb packages
        if: matrix.deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p qssh
          cargo deb -p qsshd

      - name: Upload .deb packages
        if: matrix.deb
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.target }}
          path: target/debian/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate signed checksums
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [[ -z "${MINISIGN_SECRET_KEY}" ]]; then
            echo "MINISIGN_SECRET_KEY secret is required for signed releases" >&2
            exit 1
          fi

          printf '%s' "${MINISIGN_SECRET_KEY}" > minisign.key
          chmod 600 minisign.key

          (
            cd artifacts
            shopt -s nullglob
            files=(squish-*.tar.gz *.deb)
            if [[ ${#files[@]} -eq 0 ]]; then
              echo "no release artifacts found to checksum" >&2
              exit 1
            fi
            sha256sum "${files[@]}" > SHA256SUMS
          )

          docker run --rm -i \
            -v "$PWD/artifacts:/work" \
            -v "$PWD/minisign.key:/minisign.key:ro" \
            -w /work \
            jedisct1/minisign \
            -S -s /minisign.key -m SHA256SUMS -x SHA256SUMS.minisig \
            -t "squish release checksums"

          rm -f minisign.key
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**
          generate_release_notes: true
